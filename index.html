<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>🌟 新・フォーユー診断 🌟</title>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Kiwi+Maru:wght@500;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      /* Playful / Neo-Pop Colors */
      --bg-base: #E0F7FA;
      --ink-black: #111111;
      --card-bg: #FFFFFF;

      /* アクセントカラー */
      --accent-pink: #FF4081;
      --accent-yellow: #FFEA00;
      --accent-green: #00E676;
      --accent-purple: #D500F9;

      /* 動的テーマカラー */
      --theme-color: var(--accent-pink);

      /* Typography */
      --font-pixel: 'DotGothic16', sans-serif;
      --font-round: 'Kiwi Maru', serif;

      /* Chunky Shadows */
      --pop-shadow: 4px 4px 0px var(--ink-black);
      --pop-shadow-active: 0px 0px 0px var(--ink-black);
      --screen-x: clamp(18px, 5vw, 40px);
      --screen-y: clamp(24px, 6dvh, 48px);
      --app-max-width: 520px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      word-wrap: break-word;
    }

    body {
      background-color: var(--bg-base);
      color: var(--ink-black);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      overscroll-behavior-y: none;
      background-image: radial-gradient(var(--ink-black) 2px, transparent 2px);
      background-size: 20px 20px;
      font-family: var(--font-round);
    }

    #app {
      width: 100%;
      max-width: var(--app-max-width);
      background: var(--bg-base);
      border-left: 4px solid var(--ink-black);
      border-right: 4px solid var(--ink-black);
      display: flex;
      flex-direction: column;
      position: relative;
      min-height: 100vh;
      min-height: 100dvh;
      border-left-width: clamp(0px, 1vw, 4px);
      border-right-width: clamp(0px, 1vw, 4px);
    }

    .screen {
      display: none;
      flex-direction: column;
      padding: calc(var(--screen-y) + env(safe-area-inset-top)) var(--screen-x) calc(var(--screen-y) + env(safe-area-inset-bottom));
      flex-grow: 1;
      position: relative;
      align-items: center;
    }

    .screen.active {
      display: flex;
    }

    /* --- スタート画面 --- */
    #start-screen.active .stagger {
      animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
      opacity: 0;
      transform: scale(0.5);
    }

    #start-screen.active .stagger:nth-child(1) {
      animation-delay: 0.1s;
    }

    #start-screen.active .stagger:nth-child(2) {
      animation-delay: 0.2s;
    }

    #start-screen.active .stagger:nth-child(3) {
      animation-delay: 0.3s;
    }

    #start-screen.active .stagger:nth-child(4) {
      animation-delay: 0.4s;
    }

    .title-badge {
      background: var(--accent-pink);
      color: #fff;
      font-family: var(--font-pixel);
      padding: 5px 15px;
      border: 3px solid var(--ink-black);
      border-radius: 20px;
      font-size: clamp(1rem, 4vw, 1.2rem);
      transform: rotate(-5deg);
      margin-bottom: clamp(10px, 3dvh, 15px);
      box-shadow: var(--pop-shadow);
    }

    .main-title {
      font-family: var(--font-round);
      font-size: clamp(2.5rem, 11vw, 3.8rem);
      line-height: 1.1;
      font-weight: 800;
      margin: 0 0 clamp(14px, 3dvh, 20px) 0;
      text-align: center;
      color: #fff;
      -webkit-text-stroke: clamp(2px, 0.8vw, 3px) var(--ink-black);
      text-shadow: 4px 4px 0px var(--accent-purple);
      transform: rotate(2deg);
    }

    .adult-notice {
      font-family: var(--font-round);
      font-weight: 800;
      background: var(--ink-black);
      color: var(--accent-yellow);
      border: 3px solid #fff;
      padding: 10px 15px;
      border-radius: 10px;
      margin-bottom: clamp(16px, 3.5dvh, 25px);
      text-align: center;
      font-size: clamp(0.85rem, 3.5vw, 0.95rem);
      transform: rotate(-1deg);
    }

    .btn-pop {
      font-family: var(--font-pixel);
      font-size: clamp(1.2rem, 6vw, 1.6rem);
      background: var(--card-bg);
      color: var(--ink-black);
      border: 4px solid var(--ink-black);
      border-radius: 30px;
      padding: 15px 10px;
      cursor: pointer;
      box-shadow: 0px 8px 0px var(--ink-black);
      transition: all 0.1s;
      margin-top: auto;
      margin-bottom: max(16px, env(safe-area-inset-bottom));
      width: 100%;
      max-width: 320px;
    }

    .btn-pop:active {
      transform: translateY(8px);
      box-shadow: 0px 0px 0px var(--ink-black);
    }

    /* --- 設問画面 --- */
    .progress-container {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: clamp(12px, 2.5dvh, 18px);
    }

    .progress-bar-pop {
      flex-grow: 1;
      height: 20px;
      border: 3px solid var(--ink-black);
      background: var(--card-bg);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 2px 2px 0px var(--ink-black);
    }

    .progress-fill {
      height: 100%;
      background: var(--accent-green);
      width: 0%;
      transition: width 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    .q-counter {
      font-family: var(--font-pixel);
      font-size: clamp(1.2rem, 5vw, 1.5rem);
      font-weight: 700;
      color: var(--ink-black);
      background: var(--accent-yellow);
      padding: 5px 10px;
      border: 3px solid var(--ink-black);
      border-radius: 10px;
      transform: rotate(3deg);
      white-space: nowrap;
    }

    .btn-back {
      align-self: flex-start;
      font-family: var(--font-pixel);
      font-size: 0.9rem;
      background: #EEEEEE;
      border: 2px solid var(--ink-black);
      border-radius: 10px;
      padding: 5px 10px;
      margin-bottom: clamp(10px, 2dvh, 15px);
      cursor: pointer;
      box-shadow: 2px 2px 0px var(--ink-black);
      visibility: hidden;
      /* 1問目は非表示 */
    }

    .btn-back:active {
      transform: translate(2px, 2px);
      box-shadow: 0px 0px 0px var(--ink-black);
    }

    .question-card {
      font-family: var(--font-round);
      font-size: clamp(1.1rem, 5vw, 1.3rem);
      font-weight: 800;
      line-height: 1.6;
      border: 4px solid var(--ink-black);
      border-radius: 20px;
      background: var(--card-bg);
      padding: clamp(18px, 5vw, 30px) clamp(16px, 5vw, 24px);
      box-shadow: var(--pop-shadow);
      margin-bottom: clamp(18px, 4dvh, 30px);
      width: 100%;
      text-align: center;
      min-height: clamp(128px, 24dvh, 170px);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .answers {
      display: flex;
      flex-direction: column;
      gap: clamp(10px, 2dvh, 14px);
      width: 100%;
    }

    .answer-btn {
      font-family: var(--font-round);
      font-weight: 800;
      font-size: clamp(1rem, 4vw, 1.2rem);
      background: var(--card-bg);
      border: 3px solid var(--ink-black);
      border-radius: 15px;
      color: var(--ink-black);
      padding: clamp(13px, 3.6vw, 16px) clamp(12px, 4vw, 18px);
      min-height: 54px;
      text-align: center;
      cursor: pointer;
      box-shadow: 4px 4px 0px var(--ink-black);
      transition: all 0.1s;
    }

    .answer-btn:nth-child(1):active {
      background: var(--accent-pink);
      color: #fff;
    }

    .answer-btn:nth-child(2):active {
      background: var(--accent-yellow);
    }

    .answer-btn:nth-child(3):active {
      background: var(--accent-green);
    }

    .answer-btn:nth-child(4):active {
      background: #40C4FF;
    }

    .answer-btn:active {
      transform: translate(4px, 4px);
      box-shadow: 0px 0px 0px var(--ink-black);
    }

    /* --- 結果画面 --- */
    #result-screen {
      background: linear-gradient(135deg, #2c3e50, #3498db);
      overflow-y: auto;
      justify-content: flex-start;
      padding-top: calc(40px + env(safe-area-inset-top));
    }

    #result-screen.active .stagger {
      opacity: 0;
      animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
    }

    .result-title {
      font-size: 1.5rem;
      margin: 0 0 20px;
      text-align: center;
      font-family: var(--font-pixel);
      color: #ffd700;
      text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.35);
    }

    .result-card {
      background: #fff;
      color: #333;
      width: 100%;
      border-radius: 20px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      margin-bottom: 20px;
      border: none;
    }

    .result-char-name {
      font-size: 2rem;
      font-weight: bold;
      color: #e91e63;
      margin: 0 0 5px;
      line-height: 1.2;
    }

    .result-sub-type {
      font-size: 0.9rem;
      color: #7f8c8d;
      margin-bottom: 15px;
    }

    .result-image {
      width: 250px;
      height: auto;
      max-width: 100%;
      margin: 0 auto 20px;
      display: block;
      filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.15));
      animation: float 3s ease-in-out infinite;
    }

    .result-summary {
      font-size: 1.05rem;
      font-weight: 800;
      line-height: 1.5;
      color: #555;
      margin: 0;
    }

    .result-details {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      margin: 18px 0 0;
      text-align: left;
    }

    .sticker-card {
      background: #FFF;
      border: 3px solid var(--ink-black);
      border-radius: 18px;
      box-shadow: var(--pop-shadow);
      padding: 14px;
      transform: rotate(-1deg);
    }

    .sticker-card:nth-child(even) {
      transform: rotate(1deg);
    }

    .sticker-title {
      display: inline-block;
      font-family: var(--font-pixel);
      font-weight: 800;
      background: var(--theme-color);
      color: #fff;
      border: 2px solid var(--ink-black);
      border-radius: 999px;
      padding: 4px 12px;
      margin-bottom: 10px;
      box-shadow: 2px 2px 0 var(--ink-black);
    }

    .status-lines {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .res-text-content {
      font-size: clamp(1rem, 4vw, 1.12rem);
      font-weight: 800;
      line-height: 1.55;
      margin: 0;
    }

    .status-main {
      color: var(--theme-color);
      font-size: clamp(1.12rem, 5vw, 1.28rem);
    }

    .status-sub {
      border-top: 2px dashed var(--ink-black);
      padding-top: 8px;
    }

    .tag-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag-pop {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--theme-color);
      color: #fff;
      border: 2px solid var(--ink-black);
      border-radius: 999px;
      padding: 6px 10px;
      font-family: var(--font-pixel);
      font-weight: 800;
      font-size: clamp(0.9rem, 3.6vw, 1rem);
      line-height: 1.2;
      box-shadow: 2px 2px 0 var(--ink-black);
    }

    .weakness-card {
      background: #FFF0F5;
    }

    .weakness-card .sticker-title {
      background: var(--ink-black);
      color: #fff;
    }

    .weakness-text {
      border: 2px solid var(--accent-pink);
      border-radius: 12px;
      background: #fff;
      color: #444;
      padding: 10px;
    }

    .share-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 0;
      width: 100%;
    }

    .share-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      display: inline-block;
      box-shadow: 0 4px 0 rgba(0, 0, 0, 0.2);
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .share-btn:active {
      transform: translateY(4px);
      box-shadow: none;
    }

    .share-x {
      background: #000;
    }

    .share-line {
      background: #06C755;
    }

    .start-tip {
      font-family: var(--font-round);
      font-weight: 800;
      background: var(--card-bg);
      border: 3px solid var(--ink-black);
      padding: clamp(10px, 3vw, 14px) clamp(14px, 4vw, 18px);
      border-radius: 15px;
      box-shadow: var(--pop-shadow);
      margin-bottom: clamp(18px, 5dvh, 30px);
      text-align: center;
      font-size: clamp(0.9rem, 3.6vw, 1rem);
      width: min(100%, 360px);
    }

    @media (hover: hover) and (pointer: fine) {
      .btn-pop:hover:not(:active),
      .answer-btn:hover:not(:active),
      .btn-back:hover:not(:active) {
        transform: translate(-1px, -1px);
        box-shadow: 5px 5px 0px var(--ink-black);
      }

      .btn-pop:hover:not(:active) {
        box-shadow: 0px 9px 0px var(--ink-black);
      }
    }

    @media (max-width: 380px) {
      :root {
        --screen-x: 16px;
        --screen-y: 20px;
        --pop-shadow: 3px 3px 0px var(--ink-black);
      }

      .main-title {
        font-size: clamp(2.2rem, 12vw, 2.8rem);
        text-shadow: 3px 3px 0px var(--accent-purple);
      }

      .title-badge,
      .q-counter,
      .btn-pop,
      .question-card,
      .answer-btn,
      .sticker-card {
        border-width: 3px;
      }

      .answer-btn {
        min-height: 50px;
      }
    }

    @media (max-height: 700px) and (max-width: 600px) {
      :root {
        --screen-y: 16px;
      }

      .adult-notice,
      .start-tip {
        margin-bottom: 14px;
      }

      .question-card {
        min-height: 112px;
        line-height: 1.45;
      }

      .answer-btn {
        min-height: 48px;
        padding-top: 10px;
        padding-bottom: 10px;
      }
    }

    @media (min-width: 768px) {
      :root {
        --app-max-width: 560px;
        --screen-x: 42px;
        --screen-y: 48px;
        --pop-shadow: 5px 5px 0px var(--ink-black);
      }

      body {
        align-items: center;
        padding: 28px;
      }

      #app {
        min-height: min(860px, calc(100dvh - 56px));
        border: 4px solid var(--ink-black);
        border-radius: 28px;
        box-shadow: 12px 12px 0px rgba(17, 17, 17, 0.2);
        overflow: hidden;
      }

      .screen {
        justify-content: center;
      }

      #question-screen.screen {
        justify-content: flex-start;
      }

      .question-card {
        font-size: 1.32rem;
      }

      .answer-btn {
        font-size: 1.08rem;
      }

      #start-screen .btn-pop {
        margin-top: 12px;
      }
    }

    @keyframes bounceIn {
      0% {
        transform: scale(0.5);
        opacity: 0;
      }

      70% {
        transform: scale(1.05);
        opacity: 1;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0) rotate(0deg);
      }

      50% {
        transform: translateY(-10px) rotate(3deg);
      }
    }
  </style>
</head>

<body>

  <div id="app">
    <div id="start-screen" class="screen active">
      <div class="title-badge stagger">性格14タイプ診断</div>
      <h1 class="main-title stagger">フォーユー診断</h1>

      <div class="stagger adult-notice">
        ⚠️ 大人の人は<br>中学生くらいの自分の性格で回答してね！
      </div>

      <div class="stagger start-tip">
        「どちらでもない」は禁止！<br>直感でバシバシ答えてね👆
      </div>

      <button class="btn-pop stagger" onclick="startQuiz()">はじめる！</button>
    </div>

    <div id="question-screen" class="screen">
      <button class="btn-back" id="back-btn" onclick="goBack()">◀ まえに戻る</button>

      <div class="progress-container">
        <div class="q-counter" id="q-counter">Q.1</div>
        <div class="progress-bar-pop">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
      </div>

      <div class="question-card" id="question-text"></div>

      <div class="answers">
        <button class="answer-btn" onclick="answer(4)">完全にそう！💖</button>
        <button class="answer-btn" onclick="answer(3)">まあそうかな✌️</button>
        <button class="answer-btn" onclick="answer(2)">少し違うかも💦</button>
        <button class="answer-btn" onclick="answer(1)">ぜんぜん違う🙅‍♀️</button>
      </div>
    </div>

    <div id="result-screen" class="screen">
      <h2 class="result-title stagger">🌟 診断完了 🌟</h2>

      <div class="result-card stagger">
        <h3 class="result-char-name" id="res-name">キャラクター名</h3>
        <div class="result-sub-type" id="res-label">TYPE: --</div>

        <img src="" alt="キャラクター画像" class="result-image" id="res-image">

        <p class="result-summary" id="res-core">
          キミの隠された才能が暴かれたぞ！<br>友達にもシェアして結果を見せ合おう！
        </p>

        <div class="result-details" aria-label="診断タイプのくわしい特徴">
          <div class="sticker-card">
            <div class="sticker-title">１ 基本ステータス</div>
            <div class="status-lines">
              <p id="res-status-main" class="res-text-content status-main"></p>
              <p id="res-status-sub" class="res-text-content status-sub"></p>
            </div>
          </div>

          <div class="sticker-card">
            <div class="sticker-title">２ あなたの強み✨</div>
            <div id="res-strengths" class="tag-container"></div>
          </div>

          <div class="sticker-card weakness-card">
            <div class="sticker-title">３ あなたの弱点💣</div>
            <p id="res-weakness" class="res-text-content weakness-text"></p>
          </div>
        </div>
      </div>

      <div class="share-buttons stagger">
        <a href="#" class="share-btn share-x" id="share-x" target="_blank" rel="noopener">𝕏 でシェア</a>
        <a href="#" class="share-btn share-line" id="share-line" target="_blank" rel="noopener">LINE で送る</a>
      </div>

      <button class="btn-pop stagger" onclick="location.reload()" style="margin-top: 30px; font-size: 1rem;">もう一度診断する</button>
    </div>
  </div>

  <script>
    // 中学生向けに意訳した設問リスト（全20問ミックス）
    const questions = [
        { text: "「嫌なことは嫌！」と先生や先輩相手でもハッキリ言えちゃう。", type: "C" },
        { text: "「将来〇〇になりたい！」「来週の行事楽しみ！」と、先のことばかり考えてワクワクしている。", type: "P" },
        { text: "友達のために何かしてあげたのに、「ありがとう」と言われないと結構モヤモヤする。", type: "S" },
        { text: "会議や話し合いで、自分の意見をみんなの前で発表するのは苦手だ。", type: "A" },
        { text: "休み時間や放課後は、少しの時間でも無駄にせずいろいろ詰め込んじゃう。", type: "C" },
        { text: "クラスメイトから「一緒にいると面白いね」とよく言われる。", type: "P" },
        { text: "友達から「これ手伝って！」と頼まれると、断れずに引き受けちゃう。", type: "S" },
        { text: "初対面の人やあまり話したことない人には、かなり警戒しちゃう。", type: "A" },
        { text: "友達と話すとき、思ったことをそのままズバッと言っちゃうことが多い。", type: "C" },
        { text: "先生に怒られたり、テストの点が悪くても、「ま、いっか！」とすぐ立ち直れる。", type: "P" },
        { text: "「あの子は頭がいいな」「あの子は運動できるな」と、つい自分と周りを比べちゃう。", type: "S" },
        { text: "班の目標を決めたり何かを選ぶ時は、情報をいっぱい集めてじっくり考えたい。", type: "A" },
        { text: "テストの点数や体育の試合など、勝負事になると絶対に負けたくない！", type: "C" },
        { text: "友達とおしゃべりしていると、いつの間にか自分がずっと話している。", type: "P" },
        { text: "クラスで困っている人がいると、つい声をかけて世話を焼いちゃう。", type: "S" },
        { text: "新しいクラスになった時は、自分から話しかけるより様子を見ちゃう人見知りタイプ。", type: "A" },
        { text: "ノートをまとめたり、係の仕事をする時は、完璧にやらないと気が済まない。", type: "C" },

    let currentQ = 0;
    let answersArray = [];

    function startQuiz() {
        document.getElementById('start-screen').classList.remove('active');
        document.getElementById('question-screen').classList.add('active');
        showQuestion();
    }

    function showQuestion() {
        const qCard = document.getElementById('question-text');
        const backBtn = document.getElementById('back-btn');
        
        // アニメーションのリセット
        qCard.style.animation = 'none';
        void qCard.offsetWidth; // リフロー強制
        
        document.getElementById('q-counter').innerText = `Q.${currentQ + 1}`;
        document.getElementById('progress-fill').style.width = `${((currentQ + 1) / 20) * 100}%`;
        qCard.innerText = questions[currentQ].text;
        
        // 戻るボタンの表示制御
        backBtn.style.visibility = (currentQ > 0) ? 'visible' : 'hidden';

        qCard.style.animation = 'bounceIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards';
    }

    function answer(scoreValue) {
        answersArray[currentQ] = { type: questions[currentQ].type, score: scoreValue };
        currentQ++;
        
        if (currentQ < 20) {
            setTimeout(showQuestion, 150); // 少しディレイを入れてアニメーションを強調
        } else {
            calculateResult();
        }
    }

    function goBack() {
        if (currentQ > 0) {
            currentQ--;
            showQuestion();
        }
    }

    function calculateResult() {
        // 初期補正点（P:+1, S:+1, A:+2）
        let scores = { C: 0, P: 1, S: 1, A: 2 }; 
        let counts4 = { C: 0, P: 0, S: 0, A: 0 }; // 「完全にそう(4点)」の数
        let counts34 = { C: 0, P: 0, S: 0, A: 0 }; // 「ポジティブ回答(3・4点)」の数

        answersArray.forEach(ans => {
            scores[ans.type] += ans.score;
            if (ans.score === 4) counts4[ans.type]++;
            if (ans.score >= 3) counts34[ans.type]++;
        });

        let types = ['C', 'P', 'S', 'A'];
        
        // タイブレーク処理を含むソート
        types.sort((a, b) => {
            if (scores[b] !== scores[a]) return scores[b] - scores[a]; // ①合計点
            if (counts4[b] !== counts4[a]) return counts4[b] - counts4[a]; // ②4点の数
            if (counts34[b] !== counts34[a]) return counts34[b] - counts34[a]; // ③3,4点の数
            
            // ④それでも同点の場合の固定優先度 (C > P > S > A)
            let order = {C:4, P:3, S:2, A:1};
            return order[b] - order[a];
        });

        let primary = types[0];
        let secondary = types[1];
        let diff = scores[primary] - scores[secondary];

        let finalTypeKey = "";

        // 1位と2位の差が4点以上の場合は「純粋タイプ」
        if (diff >= 4) {
            finalTypeKey = `${primary}-${primary}`;
        } else {
            let combo = `${primary}-${secondary}`;
            // 融合タイプの特別判定
            if (combo === "S-C" || combo === "C-S") finalTypeKey = "SC融合";
            else if (combo === "A-P" || combo === "P-A") finalTypeKey = "AP融合";
            else finalTypeKey = combo;
        }

        // 万が一、定義データに存在しない組み合わせになった場合のフォールバック
        if (!typeDict[finalTypeKey]) {
            finalTypeKey = `${primary}-${primary}`;
        }

        const resData = typeDict[finalTypeKey];
        
        // 結果画面の描画（判定ロジックやスコア内訳は表示しない）
        document.documentElement.style.setProperty('--theme-color', resData.hex);
        document.getElementById('res-name').innerText = resData.name;
        document.getElementById('res-label').innerText = `TYPE: ${finalTypeKey}`;
        document.getElementById('res-core').innerHTML = `${resData.core}<br>キミの隠された才能が暴かれたぞ！<br>友達にもシェアして結果を見せ合おう！`;
        document.getElementById('res-status-main').innerText = resData.status[0];
        document.getElementById('res-status-sub').innerText = resData.status[1];
        document.getElementById('res-strengths').innerHTML = resData.strengths
            .map(strength => `<span class="tag-pop">${strength}</span>`)
            .join('');
        document.getElementById('res-weakness').innerText = resData.weakness;

        const resultImage = document.getElementById('res-image');
        resultImage.src = resData.image;
        resultImage.alt = `${resData.name}のキャラクター画像`;

        const shareText = `フォーユー診断の結果は「${resData.name}」でした！ #フォーユー診断`;
        const shareUrl = location.href.split('#')[0];
        document.getElementById('share-x').href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}&url=${encodeURIComponent(shareUrl)}`;
        document.getElementById('share-line').href = `https://line.me/R/msg/text/?${encodeURIComponent(`${shareText} ${shareUrl}`)}`;

        document.getElementById('question-screen').classList.remove('active');
        document.getElementById('result-screen').classList.add('active');
        window.scrollTo(0,0);
    }
